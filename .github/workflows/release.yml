name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: '버전 증가 방식'
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
        default: patch

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump version (${{ inputs.release_type }})
        id: bump
        run: |
          NEW_VERSION=$(npm version "${{ inputs.release_type }}" --no-git-tag-version)
          echo "version=${NEW_VERSION#v}" >> "$GITHUB_OUTPUT"
          echo "tag=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Package VSIX
        run: npx vsce package --allow-missing-repository --skip-license

      - name: Commit version bump and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): ${{ steps.bump.outputs.tag }}"
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin HEAD --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: ${{ steps.bump.outputs.tag }}
          files: '*.vsix'
          generate_release_notes: true
